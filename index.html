<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUMIN - Neon Arcade</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACsTGUuqymFd1emLyGp0uL7foTEiumH9k",
            authDomain: "neon-ball-lego.firebaseapp.com",
            projectId: "neon-ball-lego",
            storageBucket: "neon-ball-lego.firebasestorage.app",
            messagingSenderId: "1001917014792",
            appId: "1:1001917014792:web:dcbcb583d05036f22002bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveScore = async (nick, score) => {
            if(!nick || score <= 0) return;
            try {
                await addDoc(collection(db, "leaderboard"), { nick, score: Number(score), date: Date.now() });
                window.loadLeaderboard();
            } catch (e) { console.error("Firebase Save Error:", e); }
        };

        window.loadLeaderboard = async () => {
            try {
                const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(15));
                const snap = await getDocs(q);
                const list = document.getElementById("lb-list");
                if(!list) return; 
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const isMe = (d.nick === window.playerNick);
                    const style = isMe ? 'color: #ffd700; font-weight: bold; text-shadow: 0 0 8px #ffd700;' : '';
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; ${style}">
                        <span>${isMe ? '▶ ' : ''}${d.nick}</span> <span>${d.score}</span>
                    </div>`;
                });
            } catch (e) { console.error("Load Leaderboard Error:", e); }
        };
    </script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        .dimmed { filter: brightness(0.3) blur(2px); transition: filter 0.5s ease; pointer-events: none; }
        
        #nick-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; touch-action: auto; }
        #nick-input { background: #111; border: 2px solid #f0f; color: #fff; padding: 10px; font-size: 20px; text-align: center; outline: none; margin-bottom: 20px; touch-action: manipulation; }
        #start-btn { background: #f0f; color: #fff; border: none; padding: 10px 30px; font-weight: bold; cursor: pointer; touch-action: manipulation; }
        
        #scoreboard { width: 400px; background: #000; border: 2px solid #444; border-bottom: none; box-sizing: border-box; display: flex; justify-content: space-around; padding: 15px 0; transition: filter 0.5s ease; }
        .stat-box { text-align: center; }
        .label { font-size: 14px; display: block; text-transform: uppercase; letter-spacing: 3px; color: #aaa; margin-bottom: 6px; font-weight: bold; }
        #currentScore { color: #0ff; text-shadow: 0 0 12px #0ff; }
        #bestScore { color: #f0f; text-shadow: 0 0 12px #f0f; }
        .value { font-size: 36px; font-weight: bold; }
        
        canvas { border: 2px solid #444; background-color: #000; max-width: 100%; display: block; transition: filter 0.5s ease; touch-action: none; -webkit-tap-highlight-color: transparent; }
        
        #game-over-ui { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); width: 280px; display: none; flex-direction: column; align-items: center; z-index: 20; pointer-events: none; }
        .go-title { color: #fff; font-size: 38px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 15px #f0f; }
        .replay-btn { color: #fff; font-size: 18px; margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 10px #0ff; animation: subtelneMiganie 1.5s ease-in-out infinite; }
        @keyframes subtelneMiganie { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
        
        #leaderboard { width: 100%; background: rgba(20, 20, 20, 0.95); border: 2px solid #0ff; color: #fff; padding: 15px; text-align: center; box-sizing: border-box; box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); }
        #ad-container { width: 400px; height: 45px; background: #000; border: 2px solid #444; border-top: none; box-sizing: border-box; position: relative; overflow: hidden; cursor: pointer; display: flex; align-items: center; padding-left: 10px; transition: filter 0.5s ease; }
        #yt-logo { width: 24px; height: 18px; background: #f00; border-radius: 4px; position: relative; display: flex; align-items: center; justify-content: center; margin-right: 10px; flex-shrink: 0; z-index: 2; }
        #yt-logo::after { content: ""; border-left: 6px solid white; border-top: 4px solid transparent; border-bottom: 4px solid transparent; }
        #ad-text { white-space: nowrap; color: #ffd700; font-weight: bold; font-size: 13px; transform: translateX(360px); z-index: 1; }
        .blink-fast { animation: blinker 0.4s step-start infinite; color: #fff !important; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="nick-overlay">
        <h2 style="color: #0ff; letter-spacing: 2px;">PILOT IDENTIFICATION</h2>
        <input type="text" id="nick-input" placeholder="Enter Nick..." maxlength="10" autocomplete="off">
        <button id="start-btn">ENGAGE</button>
    </div>

    <div id="scoreboard">
        <div class="stat-box"><span class="label">SCORE</span><span id="currentScore" class="value">0</span></div>
        <div class="stat-box"><span class="label">YOUR BEST</span><span id="bestScore" class="value">0</span></div>
    </div>

    <div style="position: relative;">
        <canvas id="gameCanvas"></canvas>
        <div id="game-over-ui">
            <div class="go-title">GAME OVER</div>
            <div class="replay-btn">TAP TO REPLAY</div>
            <div id="leaderboard">
                <h3 style="margin-top:0; color:#f0f;">BEST PLAYERS</h3>
                <div id="lb-list" style="font-size: 13px; font-family: monospace;"></div>
            </div>
        </div>
    </div>

    <div id="ad-container" onclick="openRandomVideo()">
        <div id="yt-logo"></div>
        <div id="ad-text"></div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d", { alpha: false });
    const scoreElement = document.getElementById("currentScore");
    const bestScoreElement = document.getElementById("bestScore");
    const scoreboard = document.getElementById("scoreboard");
    const adContainer = document.getElementById("ad-container");
    const gameOverUI = document.getElementById("game-over-ui");
    const nickOverlay = document.getElementById("nick-overlay");
    const nickInput = document.getElementById("nick-input");

    canvas.width = 400; canvas.height = 600;

    window.playerNick = localStorage.getItem("neonBallNick") || "";
    if(window.playerNick) nickInput.value = window.playerNick;

    document.getElementById("start-btn").onclick = (e) => {
        if(nickInput.value.length < 2) return alert("Nick too short!");
        window.playerNick = nickInput.value;
        localStorage.setItem("neonBallNick", window.playerNick);
        nickOverlay.style.display = "none";
        gameActive = true;
        if(window.loadLeaderboard) window.loadLeaderboard();
    };

    const myVideos = ["L3JZS2R_D6k","BJU6OyDPMEY","BzM9CYuPW8M"];
    const adTexts = ["Wanna see how these LEGO cars were built?", "Epic custom LEGO MOCs!"];
    const adContainerText = document.getElementById("ad-text");
    let isAdRunning = false;

    function openRandomVideo() {
        const id = myVideos[Math.floor(Math.random() * myVideos.length)];
        window.open("https://www.youtube.com/watch?v=" + id, "_blank");
    }

    function runAdCycle() {
        if (isAdRunning) return; isAdRunning = true;
        adContainerText.innerText = adTexts[Math.floor(Math.random() * adTexts.length)];
        let pos = 360;
        const scroll = setInterval(() => {
            pos -= 2.2; adContainerText.style.transform = `translateX(${pos}px)`;
            if (pos <= 5) {
                clearInterval(scroll); adContainerText.style.transform = `translateX(5px)`;
                setTimeout(() => {
                    adContainerText.innerText = "CLICK TO WATCH!"; adContainerText.classList.add("blink-fast");
                    setTimeout(() => {
                        adContainerText.classList.remove("blink-fast"); adContainerText.innerText = "";
                        adContainerText.style.transform = `translateX(360px)`; isAdRunning = false;
                    }, 4000);
                }, 1000);
            }
        }, 20);
    }
    setInterval(runAdCycle, 30000); setTimeout(runAdCycle, 3000);

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f, t, d, v) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    }
    const sfx = { jump: () => playSound(480,'triangle',0.1,0.3), score: () => playSound(950,'sine',0.2,0.12), hit: () => { playSound(120,'sawtooth',0.4,0.2); playSound(80,'sine',0.5,0.2); } };

    const bgCanvas = document.createElement('canvas'); bgCanvas.width = 400; bgCanvas.height = 600;
    const bgCtx = bgCanvas.getContext('2d'); bgCtx.fillStyle = "#000"; bgCtx.fillRect(0,0,400,600);
    bgCtx.strokeStyle = "#151515";
    for(let i=0;i<400;i+=40){bgCtx.beginPath();bgCtx.moveTo(i,0);bgCtx.lineTo(i,600);bgCtx.stroke();}
    for(let i=0;i<600;i+=40){bgCtx.beginPath();bgCtx.moveTo(0,i);bgCtx.lineTo(400,i);bgCtx.stroke();}

    let particles = [];
    function createExplosion(x,y,c){for(let i=0;i<20;i++)particles.push({x,y,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,radius:Math.random()*3+1,alpha:1,color:c});}

    let score = 0, bestScore = localStorage.getItem("neonBallBestScore") || 0;
    bestScoreElement.innerText = bestScore;
    let gameActive = false, gameStarted = false, canRestart = true, firstLoad = true, frameCount = 0;
    
    const ball = { x: 100, y: 300, radius: 12, gravity: 0.6, velocity: 0, jump: -8, color: "#f0f", trail: [] };
    let pipes = []; const pipeWidth = 55, basePipeGap = 165, pipeSpeed = 3.2;

    function createPipe() {
        const type = ['STATIC', 'MOVING', 'SHRINKING'][Math.floor(Math.random() * 3)];
        let scoreDifficultyReduction = Math.min(0.25, Math.floor(score / 20) * 0.05);
        let currentGap = basePipeGap * (1 - scoreDifficultyReduction);
        if (type === 'STATIC') { currentGap *= 0.90; }
        const h = Math.floor(Math.random() * (600 - currentGap - 200)) + 100;
        pipes.push({ x: 400, top: h, baseTop: h, passed: false, type, offset: Math.random() * Math.PI * 2, currentGap: currentGap, maxGap: currentGap, shrinkDir: Math.random() > 0.5 ? 'TOP' : 'BOTTOM' });
    }

    function draw() {
        ctx.drawImage(bgCanvas, 0, 0);
        
        pipes.forEach(p => {
            ctx.fillStyle = "#022"; ctx.strokeStyle = p.type === 'STATIC' ? "#0ff" : (p.type === 'MOVING' ? "#0f0" : "#ff0");
            ctx.lineWidth = 3; ctx.fillRect(p.x, 0, pipeWidth, p.top); ctx.strokeRect(p.x, 0, pipeWidth, p.top);
            let bY = p.top + p.currentGap; ctx.fillRect(p.x, bY, pipeWidth, 600 - bY); ctx.strokeRect(p.x, bY, pipeWidth, 600 - bY);
        });

        if (gameActive || !gameStarted) {
            ball.trail.forEach((pos, index) => {
                const alpha = 1 - (index / ball.trail.length);
                ctx.globalAlpha = alpha * 0.4;
                ctx.beginPath();
                ctx.arc(pos.x - (index * 2), pos.y, ball.radius * (1 - index/15), 0, Math.PI * 2);
                ctx.fillStyle = ball.color;
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color; ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
        }

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.alpha -= 0.02; ctx.globalAlpha = Math.max(0, p.alpha);
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            if (p.alpha <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        if (firstLoad && gameActive && !gameStarted) {
            ctx.fillStyle = "#fff"; ctx.font = "bold 18px Arial"; ctx.textAlign = "center";
            ctx.fillText("TAP TO START", 200, 350);
        }
    }

    function update() {
        if (!gameActive || !gameStarted) return;
        frameCount++; 
        ball.velocity += ball.gravity; 
        ball.y += ball.velocity;

        ball.trail.unshift({ x: ball.x, y: ball.y });
        if (ball.trail.length > 12) ball.trail.pop();

        if (ball.y + ball.radius > 600 || ball.y - ball.radius < 0) gameOver();
        if (pipes.length === 0 || pipes[pipes.length - 1].x < 180) createPipe();
        
        for (let i = pipes.length - 1; i >= 0; i--) {
            let p = pipes[i]; p.x -= pipeSpeed;
            if (p.type === 'MOVING') p.top = p.baseTop + Math.sin(frameCount * 0.04 + p.offset) * 50;
            else if (p.type === 'SHRINKING') {
                let sVal = Math.abs(Math.sin(frameCount * 0.05 + p.offset)) * 55;
                if (p.shrinkDir === 'TOP') { p.top = p.baseTop + sVal; p.currentGap = p.maxGap - sVal; }
                else p.currentGap = p.maxGap - sVal;
            }
            if (ball.x + ball.radius > p.x && ball.x - ball.radius < p.x + pipeWidth && (ball.y - ball.radius < p.top || ball.y + ball.radius > p.top + p.currentGap)) gameOver();
            if (!p.passed && p.x + pipeWidth < ball.x) {
                score++; p.passed = true; scoreElement.innerText = score; sfx.score();
                if (score > bestScore) { bestScore = score; bestScoreElement.innerText = bestScore; localStorage.setItem("neonBallBestScore", bestScore); }
            }
            if (p.x + pipeWidth < 0) pipes.splice(i, 1);
        }
    }

    function gameOver() {
        if (gameActive) {
            sfx.hit();
            createExplosion(ball.x, ball.y, ball.color);
            gameActive = false;
            canRestart = false;
            setTimeout(() => {
                canvas.classList.add('dimmed');
                scoreboard.classList.add('dimmed');
                adContainer.classList.add('dimmed');
                gameOverUI.style.display = "flex";
                if(window.saveScore) window.saveScore(window.playerNick, score);
                setTimeout(() => { canRestart = true; }, 300);
            }, 200); 
        }
    }

    function handleAction(e) {
        // POPRAWKA: Jeśli overlay z nickiem jest widoczny, nie blokuj akcji (klawiatury/przycisku)
        if (nickOverlay.style.display !== "none") return;

        if (e.type === "keydown" && e.code !== "Space") return;
        if (e.cancelable) e.preventDefault();
        
        if (gameActive) {
            if (!gameStarted) { gameStarted = true; firstLoad = false; }
            ball.velocity = ball.jump; sfx.jump();
        } else if (canRestart) {
            canvas.classList.remove('dimmed'); scoreboard.classList.remove('dimmed'); adContainer.classList.remove('dimmed');
            ball.y = 300; ball.velocity = ball.jump; pipes = []; score = 0; scoreElement.innerText = "0";
            ball.trail = []; particles = []; frameCount = 0; gameActive = true; gameStarted = true; 
            gameOverUI.style.display = "none"; sfx.jump();
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    window.addEventListener("keydown", handleAction);
    window.addEventListener("touchstart", handleAction, { passive: false });
    loop();
</script>
</body>
</html>
