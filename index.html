<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUMIN - Neon Arcade</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACsTGUuqymFd1emLyGp0uL7foTEiumH9k",
            authDomain: "neon-ball-lego.firebaseapp.com",
            projectId: "neon-ball-lego",
            storageBucket: "neon-ball-lego.firebasestorage.app",
            messagingSenderId: "1001917014792",
            appId: "1:1001917014792:web:dcbcb583d05036f22002bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveScore = async (nick, score) => {
            if(!nick || score <= 0) return;
            try {
                await addDoc(collection(db, "leaderboard"), { nick, score: Number(score), date: Date.now() });
                window.loadLeaderboard();
            } catch (e) { console.error("Firebase Save Error:", e); }
        };

        window.loadLeaderboard = async () => {
            try {
                const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
                const snap = await getDocs(q);
                const list = document.getElementById("lb-list");
                if(!list) return; 
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const isMe = (d.nick === window.playerNick);
                    const style = isMe ? 'color: #ffd700; font-weight: bold;' : '';
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:4px; ${style}">
                        <span>${isMe ? '▶ ' : ''}${d.nick}</span> <span>${d.score}</span>
                    </div>`;
                });
            } catch (e) { console.error("Load Leaderboard Error:", e); }
        };
    </script>

    <style>
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #050505; 
            display: flex; flex-direction: column;
            font-family: 'Courier New', Courier, monospace; touch-action: none;
        }

        /* Licznik u góry */
        #scoreboard { 
            width: 100%; height: 60px; background: #000; border-bottom: 2px solid #444; 
            display: flex; justify-content: space-around; align-items: center; flex-shrink: 0;
        }
        .stat-box { text-align: center; }
        .label { font-size: 10px; color: #aaa; font-weight: bold; }
        .value { font-size: 24px; font-weight: bold; }
        #currentScore { color: #0ff; }
        #bestScore { color: #f0f; }

        /* Środek z grą */
        #game-wrapper {
            flex-grow: 1; position: relative; width: 100%; 
            display: flex; justify-content: center; align-items: center; 
            background: #000; overflow: hidden;
        }
        
        canvas { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; image-rendering: pixelated;
        }

        /* Reklama na dole */
        #ad-bar { 
            width: 100%; height: 40px; background: #000; border-top: 2px solid #444;
            display: flex; align-items: center; overflow: hidden; flex-shrink: 0;
        }

        /* Nakładki */
        #nick-overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #nick-input { background: #111; border: 2px solid #f0f; color: #fff; padding: 12px; font-size: 20px; text-align: center; margin-bottom: 20px; width: 200px; }
        #start-btn { background: #f0f; color: #fff; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; }

        #game-over-ui { 
            position: absolute; inset: 0; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.8); z-index: 20; pointer-events: none;
        }
        #leaderboard { 
            width: 260px; background: #111; border: 2px solid #0ff; padding: 15px; 
            color: #fff; font-size: 13px; margin-top: 15px;
        }
        
        #ad-text { white-space: nowrap; color: #ffd700; font-weight: bold; font-size: 12px; animation: scrollText 15s linear infinite; }
        @keyframes scrollText { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
        .dimmed { filter: brightness(0.4) blur(3px); }
    </style>
</head>
<body>

    <div id="nick-overlay">
        <h2 style="color: #0ff;">PILOT LOGIN</h2>
        <input type="text" id="nick-input" placeholder="NICKNAME" maxlength="10">
        <button id="start-btn">ENGAGE</button>
    </div>

    <div id="scoreboard">
        <div class="stat-box"><span class="label">SCORE</span><br><span id="currentScore" class="value">0</span></div>
        <div class="stat-box"><span class="label">BEST</span><br><span id="bestScore" class="value">0</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="game-over-ui">
            <h1 style="color:#f0f; margin:0; text-shadow: 0 0 10px #f0f;">GAME OVER</h1>
            <p style="color:#0ff; font-weight:bold;">TAP TO RESTART</p>
            <div id="leaderboard">
                <div style="text-align:center; color:#f0f; margin-bottom:10px;">TOP PILOTS</div>
                <div id="lb-list"></div>
            </div>
        </div>
    </div>

    <div id="ad-bar" onclick="window.open('https://youtube.com/@LegoTechnicRace', '_blank')">
        <div id="ad-text">NEW LEGO TECHNIC MOC OUT NOW! WATCH ON YOUTUBE! • CLICK TO VIEW CHANNEL • </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const gameOverUI = document.getElementById("game-over-ui");
    const nickOverlay = document.getElementById("nick-overlay");
    const nickInput = document.getElementById("nick-input");

    // Stała rozdzielczość logiczna
    canvas.width = 400; canvas.height = 600;

    let score = 0;
    let bestScore = localStorage.getItem("neonBallBestScore") || 0;
    document.getElementById("bestScore").innerText = bestScore;

    let gameActive = false;
    let gameStarted = false;
    let canRestart = true;

    const ball = { x: 80, y: 300, radius: 12, velocity: 0, gravity: 0.6, jump: -8 };
    let pipes = [];

    window.playerNick = localStorage.getItem("neonBallNick") || "";
    if(window.playerNick) nickInput.value = window.playerNick;

    document.getElementById("start-btn").onclick = () => {
        if(nickInput.value.length < 2) return;
        window.playerNick = nickInput.value;
        localStorage.setItem("neonBallNick", window.playerNick);
        nickOverlay.style.display = "none";
        gameActive = true;
        if(window.loadLeaderboard) window.loadLeaderboard();
    };

    function createPipe() {
        const gap = 160 - Math.min(score, 40);
        const top = Math.random() * (canvas.height - gap - 200) + 100;
        pipes.push({ x: 400, top, gap, passed: false });
    }

    function resetGame() {
        score = 0;
        document.getElementById("currentScore").innerText = "0";
        pipes = [];
        ball.y = 300;
        ball.velocity = 0;
        gameActive = true;
        gameStarted = false;
        canvas.classList.remove("dimmed");
        gameOverUI.style.display = "none";
    }

    function gameOver() {
        gameActive = false;
        canRestart = false;
        canvas.classList.add("dimmed");
        gameOverUI.style.display = "flex";
        if(window.saveScore) window.saveScore(window.playerNick, score);
        setTimeout(() => canRestart = true, 500);
    }

    function update() {
        if(!gameActive || !gameStarted) return;

        ball.velocity += ball.gravity;
        ball.y += ball.velocity;

        if(ball.y > canvas.height || ball.y < 0) gameOver();

        if(pipes.length === 0 || pipes[pipes.length-1].x < 220) createPipe();

        pipes.forEach((p, i) => {
            p.x -= 3.5;
            // Kolizja
            if(ball.x + 10 > p.x && ball.x - 10 < p.x + 50) {
                if(ball.y - 10 < p.top || ball.y + 10 > p.top + p.gap) gameOver();
            }
            // Punkt
            if(!p.passed && p.x < ball.x) {
                p.passed = true;
                score++;
                document.getElementById("currentScore").innerText = score;
                if(score > bestScore) {
                    bestScore = score;
                    document.getElementById("bestScore").innerText = bestScore;
                    localStorage.setItem("neonBallBestScore", bestScore);
                }
            }
            if(p.x < -60) pipes.splice(i, 1);
        });
    }

    function draw() {
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
        
        // Rury
        pipes.forEach(p => {
            ctx.fillStyle = "#022"; ctx.strokeStyle = "#0ff"; ctx.lineWidth = 3;
            ctx.fillRect(p.x, 0, 50, p.top); ctx.strokeRect(p.x, 0, 50, p.top);
            ctx.fillRect(p.x, p.top + p.gap, 50, canvas.height); ctx.strokeRect(p.x, p.top + p.gap, 50, canvas.height);
        });

        // Piłka
        ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
        ctx.fillStyle = "#f0f"; ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();

        if(gameActive && !gameStarted) {
            ctx.fillStyle = "#fff"; ctx.font = "20px Monospace"; ctx.textAlign = "center";
            ctx.fillText("TAP TO JUMP", 200, 400);
        }
    }

    function handleInput(e) {
        if(nickOverlay.style.display !== "none") return;
        if(e.cancelable) e.preventDefault();
        
        if(gameActive) {
            gameStarted = true;
            ball.velocity = ball.jump;
        } else if(canRestart) {
            resetGame();
        }
    }

    window.addEventListener("touchstart", handleInput, {passive: false});
    window.addEventListener("mousedown", handleInput);
    
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
